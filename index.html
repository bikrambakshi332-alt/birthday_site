<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Sweet Petni 💖</title>

<style>
body {
    margin: 0;
    background: black;
    overflow: hidden;
    font-family: 'Poppins', sans-serif;
    color: white;
    text-align: center;
}

/* Stars */
.star {
    position: absolute;
    width: 2px;
    height: 2px;
    background: white;
    animation: twinkle 2s infinite alternate;
}

@keyframes twinkle {
    from { opacity: 0.2; }
    to { opacity: 1; }
}

/* Screens */
.screen {
    position: absolute;
    width: 100%;
    height: 100%;
    display: none;
    justify-content: center;
    align-items: center;
    flex-direction: column;
}

#intro {
    display: flex;
    background: linear-gradient(135deg, #ff4e50, #fc913a);
}

button {
    padding: 12px 25px;
    border: none;
    border-radius: 25px;
    font-size: 16px;
    cursor: pointer;
}

/* Glow text */
.glow {
    font-size: 45px;
    animation: glow 2s infinite alternate;
}

@keyframes glow {
    from { text-shadow: 0 0 10px #fff; }
    to { text-shadow: 0 0 40px #ff66cc; }
}

/* Photo */
#photo {
    width: 200px;
    border-radius: 20px;
    margin-top: 20px;
    display: none;
}

/* Message */
#msg {
    margin-top: 20px;
    font-size: 22px;
}

/* Hearts */
.heart {
    position: absolute;
    font-size: 20px;
    animation: floatUp 5s linear infinite;
}

@keyframes floatUp {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<!-- Stars -->
<script>
for(let i=0;i<100;i++){
    let s=document.createElement("div");
    s.className="star";
    s.style.left=Math.random()*100+"vw";
    s.style.top=Math.random()*100+"vh";
    document.body.appendChild(s);
}
</script>

<!-- Intro -->
<div id="intro" class="screen">
    <h2>💖 Tap for Something Special</h2>
    <button onclick="start()">Start</button>
</div>

<!-- Screen 1 -->
<div id="s1" class="screen">
    <h1 class="glow">Happy Birthday 🎂</h1>
    <h2>MY SWEET PETNI 💖</h2>
</div>

<!-- Screen 2 -->
<div id="s2" class="screen">
    <p id="msg"></p>
</div>

<!-- Screen 3 -->
<div id="s3" class="screen">
    <h2>You + Me = Forever 💞</h2>
    <img id="image" src="image.jpg">
</div>

<!-- Screen 4 -->
<div id="s4" class="screen">
    <h2>Will You Stay With Me Forever? 💖</h2>
    <button onclick="yes()">YES 💕</button>
</div>

<!-- Final -->
<div id="final" class="screen">
    <h1 class="glow">I Love You ❤️</h1>
</div>

<audio id="music" loop>
    <source src="heppy.mp3" type="audio/mpeg">
</audio>

<script>
let msgText="From the moment you came into my life... everything became beautiful 💖";

function show(id){
    document.querySelectorAll(".screen").forEach(s=>s.style.display="none");
    document.getElementById(id).style.display="flex";
}

function start(){
    document.getElementById("music").play();
    show("s1");

    setTimeout(()=>show("s2"),3000);
    setTimeout(typeMsg,3500);
    setTimeout(()=>show("s3"),8000);
    setTimeout(()=>document.getElementById("photo").style.display="block",8500);
    setTimeout(()=>show("s4"),12000);
}

let i=0;
function typeMsg(){
    if(i<msgText.length){
        document.getElementById("msg").innerHTML+=msgText[i];
        i++;
        setTimeout(typeMsg,50);
    }
}

function yes(){
    show("final");
    createHearts();
}

function createHearts(){
    setInterval(()=>{
        let h=document.createElement("div");
        h.className="heart";
        h.innerHTML="💖";
        h.style.left=Math.random()*100+"vw";
        document.body.appendChild(h);
        setTimeout(()=>h.remove(),5000);
    },200);
}
</script>

</body>
</html>
